version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: repofleet
    main: ./cmd/repofleet
    binary: repofleet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: repofleet
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
brews:
  - name: repofleet
    repository:
      owner: mehranzand
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/mehranzand/repofleet"
    description: "Issue-centered CLI tool for managing Git workflows across multiple repositories"
    license: "MIT"

scoops:
  - name: repofleet
    repository:
      owner: mehranzand
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/mehranzand/repofleet"
    description: "Issue-centered CLI tool for managing Git workflows across multiple repositories"
    license: "MIT"
    
release:
  github:
    owner: mehranzand
    name: repofleet